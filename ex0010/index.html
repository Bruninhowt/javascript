<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS</title>
    <style>
        
    </style>
</head>
<body>
    <h2>Simulador de Multa</h2>
    <input type="number" id="vel">km/h
    <input type="button" value="Verificar" onclick="verificar()">
    <div id="res"></div>

    <script>
        function verificar(){
            var textVel = document.getElementById('vel')
            var resultado = document.getElementById('res')
            var velocidade = Number(textVel.value)
            if (velocidade > 60){
                resultado.innerHTML = 'Você foi MULTADO'
            }else{
                resultado.innerHTML = 'Você não sofreu MULTA, dirija com segurança'
            }
        }
    </script>
</body>
</html>
