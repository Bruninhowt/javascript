<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }

        body{
            background-color: darkgray;
        }

        #conteiner{
            background-color: black;
            color: white;
            width: 200px;
            height: 200px;
            margin: 10px;
            border-radius: 10px;

            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div id="conteiner">
        <p>Interaja...</p>
    </div>

    <script>
        var a = document.getElementById('conteiner')

        a.addEventListener('click', clicar)
        a.addEventListener('mouseenter', entrar)
        a.addEventListener('mouseout', saiu)
        function clicar(){
            a.innerText = 'clicou'
            a.style.backgroundColor = 'red'
        }

        function entrar(){
            a.innerText = 'entrou'
        }

        function saiu(){
            a.innerText = 'saiu'
            a.style.backgroundColor = 'green'
        }


        
    </script>
</body>
</html>
