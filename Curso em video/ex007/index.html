<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS</title>
</head>
<body>
    <h2>Somando valores</h2>
    <input type="number" name="numero1" id="caixa1"> +
    <input type="number" name="numero2" id="caixa2">
    <input type="button" value="Somar" onclick="somar()">
    <div id="res">Resultado</div>
    <script>
        function somar(){
            var pegandoN1 = window.document.getElementById('caixa1');
            var pegandoN2 = window.document.getElementById('caixa2');
            var soma = window.document.getElementById('res')
            var n1 = Number(pegandoN1.value);
            var n2 = Number(pegandoN2.value);
            var s = n1 + n2;
            res.innerHTML = `A soma entre os números ${n1} e ${n2} é igual a ${s}`
        }

        
    </script>
</body>
</html>
